# Docker Swarm Stack — GoTicket
# Usage:
#   docker compose build
#   docker swarm init
#   docker stack deploy -c docker-stack.yml goticket

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: goticket
      POSTGRES_PASSWORD: goticket123
      POSTGRES_DB: goticket
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - goticket

  mongo:
    image: mongo:7-jammy
    volumes:
      - mongodata:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - goticket

  auth-service:
    image: sre4-5as-auth-service:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: goticket
      DB_PASSWORD: goticket123
      DB_NAME: goticket
      JWT_SECRET: goticket-secret-key-2026
      SERVICE_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  user-service:
    image: sre4-5as-user-service:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: goticket
      DB_PASSWORD: goticket123
      DB_NAME: goticket
      JWT_SECRET: goticket-secret-key-2026
      SERVICE_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  event-service:
    image: sre4-5as-event-service:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: goticket
      DB_PASSWORD: goticket123
      DB_NAME: goticket
      SERVICE_PORT: "8080"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  order-service:
    image: sre4-5as-order-service:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: goticket
      DB_PASSWORD: goticket123
      DB_NAME: goticket
      JWT_SECRET: goticket-secret-key-2026
      SERVICE_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  chat-service:
    image: sre4-5as-chat-service:latest
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: goticket
      JWT_SECRET: goticket-secret-key-2026
      SERVICE_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  notification-service:
    image: sre4-5as-notification-service:latest
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: goticket
      SERVICE_PORT: "8080"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - goticket

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - goticket

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - goticket

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - goticket

volumes:
  pgdata:
  mongodata:
  grafana-data:

networks:
  goticket:
    driver: overlay
    attachable: true
