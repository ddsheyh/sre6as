groups:
  - name: goticket_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 30 seconds."

      - alert: OrderServiceDBDown
        expr: order_db_up == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Order Service lost database connection"
          description: "order_db_up metric is 0 — database is unreachable from order-service."

      - alert: HighOrderErrorRate
        expr: rate(order_errors_total[1m]) > 0.08
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High error rate in Order Service"
          description: "Order errors are increasing at {{ $value }} errors/sec."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(order_http_duration_seconds_bucket[5m])) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request latency in Order Service"
          description: "95th percentile latency is {{ $value }}s, exceeding 1s threshold."

      - alert: ServiceFlapping
        expr: changes(up[5m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} is restarting frequently"
          description: "{{ $labels.job }} has changed state {{ $value }} times in 5 minutes."
